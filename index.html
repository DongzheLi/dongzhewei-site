<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dongzhe Wei</title>
  <meta name="description" content="Dongzhe Wei is a software engineer building practical tools for learning, automation, and applied AI." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <!--
    The site is laid out like a VSCode window: an activity bar, an explorer
    (file tree) for navigation, a center editor that renders whichever "file"
    you open, a docked terminal panel, and an assistant chat on the right.
    The explorer, terminal commands, and editor all funnel through openFile()
    so every surface stays in sync.
  -->
  <div class="ide">
    <!-- Activity bar: VSCode's thin icon rail. -->
    <nav class="activity" aria-label="Activity bar">
      <button class="act is-active" data-act="explorer" title="Explorer" aria-label="Explorer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M13 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V9z"/><path d="M13 3v6h6"/></svg>
      </button>
      <button class="act act-bottom" data-act="chat" title="Assistant" aria-label="Assistant">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 11.5a8.5 8.5 0 0 1-12.4 7.5L3 21l2-5.6A8.5 8.5 0 1 1 21 11.5z"/></svg>
      </button>
    </nav>

    <!-- Explorer / file tree -->
    <aside class="explorer">
      <div class="explorer-title">Explorer</div>
      <div class="tree-root">▾ dongzhewei</div>
      <ul class="files" id="files"></ul>
    </aside>

    <!-- Center: editor on top, terminal panel docked below -->
    <main class="center">
      <div class="tabs" id="tabs"></div>
      <div class="editor" id="editor"></div>

      <section class="panel" aria-label="Panel">
        <div class="panel-tabs">
          <span class="panel-tab is-active">Terminal</span>
          <span class="panel-tab">Problems</span>
          <span class="panel-tab">Output</span>
        </div>
        <div class="terminal-body" id="terminalBody">
          <div id="output"></div>
          <div class="promptline">
            <span class="ps1">dongzhewei@web:~$</span>
            <span id="inputwrap">
              <input
                id="cmdline"
                type="text"
                autocomplete="off"
                autocapitalize="off"
                autocorrect="off"
                spellcheck="false"
                aria-label="terminal command input"
              />
            </span>
          </div>
        </div>
      </section>
    </main>

    <!-- Assistant chat -->
    <aside class="agent">
      <div class="agent-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" width="15" height="15"><path d="M21 11.5a8.5 8.5 0 0 1-12.4 7.5L3 21l2-5.6A8.5 8.5 0 1 1 21 11.5z"/></svg>
        Assistant
      </div>
      <div class="chat" id="chat"></div>
      <form class="chat-form" id="chatForm">
        <input id="chatInput" type="text" placeholder="Ask me anything…" autocomplete="off" aria-label="Ask the assistant" />
        <button type="submit" aria-label="Send">↑</button>
      </form>
    </aside>

    <!-- Status bar -->
    <div class="statusbar">
      <div class="status-left">
        <span>⎇ main</span>
        <span>✓ 0  ⚠ 0</span>
      </div>
      <div class="status-right">
        <span id="statusFile">Markdown</span>
        <span>UTF-8</span>
        <span>Ln 1, Col 1</span>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
